<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Foresight Wallet</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>

<body>

    <!-- Layout Wrapper -->
    <div class="app-layout">

        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">

            <div class="sidebar-header d-flex justify-content-between align-items-center">
                <h4 class="logo m-0">Foresight Wallet</h4>
                <button id="sidebarToggle" class="btn btn-sm btn-outline-secondary">☰</button>
            </div>

            <!-- MAIN -->
            <div class="sidebar-section">
                <p class="sidebar-title">MAIN</p>
                <a href="/dashboard">
                    <i class="bi bi-speedometer2"></i>
                    <span>Dashboard</span>
                </a>
                <a href="/spending-log">
                    <i class="bi bi-wallet2"></i>
                    <span>Spending Log</span>
                </a>
            </div>

            <!-- SPENDING INSIGHTS -->
            <div class="sidebar-section">
                <p class="sidebar-title">SPENDING INSIGHTS</p>
                <a href="/insights">
                    <i class="bi bi-graph-up"></i>
                    <span>Insights</span>
                </a>
                <a href="/feedback">
                    <i class="bi bi-chat-left-text"></i>
                    <span>Personalised Feedback</span>
                </a>
                <a href="/budget-tracker">
                    <i class="bi bi-pie-chart"></i>
                    <span>Budget Tracker</span>
                </a>
            </div>

            <!-- FINANCIAL RISK -->
            <div class="sidebar-section">
                <p class="sidebar-title">FINANCIAL RISK</p>
                <a href="/risk">
                    <i class="bi bi-shield-exclamation"></i>
                    <span>Financial Risk Indicator</span>
                </a>
            </div>

        </div>

        <!-- Main Content Area -->
        <div class="main-content">

            <!-- Top Navbar -->
            {% if user %}
            <nav class="navbar navbar-light bg-white shadow-sm mb-4">
                <div class="content-wrapper d-flex justify-content-end">
                    <span class="me-3 fw-bold">Welcome, {{ user }}</span>
                    <a href="/logout" class="btn btn-outline-dark btn-sm">Logout</a>
                </div>
            </nav>
            {% endif %}

            <div class="content-wrapper">
                {% block content %}{% endblock %}
            </div>

        </div>

    </div>

    <script>
        document.getElementById("sidebarToggle").addEventListener("click", function () {
            document.getElementById("sidebar").classList.toggle("collapsed");
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
