<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign In - Foresight Wallet</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="login-body">

<!-- NAVBAR (so user can go back) -->
<nav class="navbar navbar-dark bg-black px-4">
    <a href="/" class="navbar-brand fw-bold text-white">
        Foresight Wallet
    </a>

    <div class="ms-auto">
        <a href="/login" class="btn btn-outline-light me-2">Sign In</a>
        <a href="/register" class="btn btn-light">Sign Up</a>
    </div>
</nav>


<!-- LOGIN WRAPPER -->
<div class="container login-wrapper">
    <div class="login-card text-center">

        <div class="mb-4">
            <div style="font-size: 28px;">🔒</div>
            <h4 class="mt-3">Welcome Back</h4>
        </div>

        <!-- FORM -->
        <form method="POST" action="/login">
            <div class="mb-3">
                <input type="email"
                       class="form-control login-input"
                       name="email"
                       placeholder="Email Address"
                       required>
            </div>

            <div class="mb-3">
                <input type="password"
                       class="form-control login-input"
                       name="password"
                       placeholder="Password"
                       required>
            </div>

            <button type="submit" class="btn login-btn w-100">
                Sign In
            </button>
        </form>

        <!-- DIVIDER -->
        <div class="divider">OR</div>

        <!-- GOOGLE LOGIN -->
        <a href="/google-login" class="btn btn-outline-dark w-100 mb-3">
            <img src="https://developers.google.com/identity/images/g-logo.png"
                 width="18"
                 class="me-2">
            Sign in with Google
        </a>

        <!-- REGISTER LINK -->
        <div class="text-center mt-3">
            <small>
                Don't have an account?
                <a href="/register" class="fw-semibold text-dark text-decoration-none">
                    Sign Up
                </a>
            </small>
        </div>

    </div>
</div>

</body>
</html>
