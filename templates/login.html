<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign In - Foresight Wallet</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="login-body">

<div class="login-container">
    <div class="login-card">

        <div class="text-center mb-4">
            <div class="lock-icon">🔒</div>
            <h4 class="mt-3">Welcome Back</h4>
        </div>

        <form method="POST" action="/login">
            <div class="mb-3">
                <input type="email" class="form-control login-input" name="email" placeholder="Email Address" required>
            </div>

            <div class="mb-3">
                <input type="password" class="form-control login-input" name="password" placeholder="Password" required>
            </div>

            <button type="submit" class="btn btn-dark w-100 login-btn">
                Sign In
            </button>
        </form>

        <div class="divider my-4">OR</div>

        <a href="/google-login" class="btn btn-outline-dark w-100 mb-3">
            <img src="https://developers.google.com/identity/images/g-logo.png" width="18" class="me-2">
            Sign in with Google
        </a>

        <div class="text-center mt-3">
            <small>Don't have an account?
                <a href="/register" class="text-decoration-none fw-semibold">Sign Up</a>
            </small>
        </div>

    </div>
</div>

</body>
</html>
